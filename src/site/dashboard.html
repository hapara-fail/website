<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard – hapara.fail</title>
    <meta name="description" content="Your hapara.fail dashboard." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <link rel="stylesheet" href="/fonts/poppins/poppins.css" />
    <link rel="stylesheet" href="/css/universal.css" />
    <link rel="stylesheet" href="/css/auth.css" />
  </head>

  <body>
    <a href="#main-content" class="visually-hidden">Skip to main content</a>
    <header class="main-header">
      <a href="/" class="logo gradient-text" aria-label="hapara.fail Homepage">hapara.fail</a>
      <button
        class="hamburger-menu"
        aria-label="Open navigation menu"
        aria-controls="site-drawer"
        aria-expanded="false"
      >
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
      </button>
    </header>

    <div class="nav-overlay" data-nav-overlay hidden></div>
    <nav class="nav-drawer" id="site-drawer" aria-label="Main menu" data-nav-drawer hidden></nav>

    <main id="main-content">
      <section class="auth-page">
        <div class="auth-card dashboard-card" id="dashboard-content" style="display: none">
          <div class="user-avatar" id="user-avatar"></div>
          <h1 class="gradient-text user-name" id="user-name"></h1>
          <p class="user-email" id="user-email"></p>
          <button class="auth-submit auth-submit--outline" id="logout-btn">
            <span class="auth-spinner"></span>
            <span class="auth-submit-text">Log Out</span>
          </button>
        </div>
      </section>
    </main>

    <script src="/js/version-data.js" defer></script>
    <script src="/js/nav.js" defer></script>
    <script src="/js/auth-client.js" defer></script>
    <script src="/js/cookie-notice.js" defer></script>
  </body>
</html>
